name: Flutter CI

on:
  push:
    branches:
      - main
      - master
    paths:
      - buyv_flutter/**
      - .github/workflows/flutter-ci.yml
  pull_request:
    paths:
      - buyv_flutter/**
      - .github/workflows/flutter-ci.yml

concurrency:
  group: flutter-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flutter-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: buyv_flutter

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Static analysis
        run: flutter analyze

      - name: Run tests
        run: flutter test
